services:
  postgres-skimterview:
    image: 'postgres:18'
    container_name: postgres-skimterview
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - skimterview_postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - db-net

  redis-skimterview:
    image: 'redis:7-alpine'
    container_name: redis-skimterview
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      TZ: ${TZ}
    ports:
      - "6379:6379"
    networks:
      - db-net
    volumes:
      - skimterview_redis_data:/data


networks:
  db-net:
    name: db-net

volumes:
  skimterview_postgres_data:
  skimterview_redis_data:
